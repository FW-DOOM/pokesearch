<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background rounded square -->
  <rect width="180" height="180" rx="40" ry="40" fill="#1a1a2e"/>
  
  <!-- Pokeball top half (red) -->
  <path d="M30,90 A60,60 0 0,1 150,90 Z" fill="#e63946"/>
  
  <!-- Pokeball bottom half (white) -->
  <path d="M30,90 A60,60 0 0,0 150,90 Z" fill="#f1f5f9"/>
  
  <!-- Pokeball outline circle -->
  <circle cx="90" cy="90" r="60" fill="none" stroke="#111" stroke-width="5"/>
  
  <!-- Center line -->
  <line x1="30" y1="90" x2="150" y2="90" stroke="#111" stroke-width="5"/>
  
  <!-- Center button outer -->
  <circle cx="90" cy="90" r="16" fill="#111"/>
  
  <!-- Center button inner -->
  <circle cx="90" cy="90" r="10" fill="#f1f5f9"/>
  
  <!-- Shine -->
  <circle cx="75" cy="68" r="7" fill="white" opacity="0.25"/>
</svg>
