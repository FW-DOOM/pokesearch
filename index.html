<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PokeSearch" />
    <meta name="theme-color" content="#0a0a14" />
    <title>PokeSearch</title>
    <style>
      html, body { background: #0a0a14; margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            // When a new service worker takes over, reload to get the latest build
            reg.addEventListener('updatefound', () => {
              const sw = reg.installing
              if (!sw) return
              sw.addEventListener('statechange', () => {
                // Only reload if there was already a controller (not the very first install)
                if (sw.state === 'activated' && navigator.serviceWorker.controller) {
                  window.location.reload()
                }
              })
            })
          })
        })
      }
    </script>
  </body>
</html>
